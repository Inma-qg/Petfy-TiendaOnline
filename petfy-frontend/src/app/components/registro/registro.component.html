<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body p-5">
          
          <!-- Título -->
          <div class="text-center mb-4">
            <i class="bi bi-person-plus" style="font-size: 3rem; color: #0d6efd;"></i>
            <h3 class="mt-3">Crear Cuenta</h3>
            <p class="text-muted">Únete a PETFY</p>
          </div>

          <!-- Mensaje de error -->
          <div *ngIf="error" class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-triangle"></i> {{ error }}
          </div>

          <!-- Formulario -->
          <form (ngSubmit)="registrar()">
            
            <div class="row">
              <!-- Nombre -->
              <div class="col-md-6 mb-3">
                <label for="nombre" class="form-label">Nombre *</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="nombre"
                  [(ngModel)]="usuario.nombre" 
                  name="nombre"
                  placeholder="Tu nombre"
                  required
                  [disabled]="cargando">
              </div>

              <!-- Apellidos -->
              <div class="col-md-6 mb-3">
                <label for="apellidos" class="form-label">Apellidos</label>
                <input 
                  type="text" 
                  class="form-control" 
                  id="apellidos"
                  [(ngModel)]="usuario.apellidos" 
                  name="apellidos"
                  placeholder="Tus apellidos"
                  [disabled]="cargando">
              </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label for="email" class="form-label">
                <i class="bi bi-envelope"></i> Email *
              </label>
              <input 
                type="email" 
                class="form-control" 
                id="email"
                [(ngModel)]="usuario.email" 
                name="email"
                placeholder="tu@email.com"
                required
                [disabled]="cargando">
            </div>

            <div class="row">
              <!-- Contraseña -->
              <div class="col-md-6 mb-3">
                <label for="password" class="form-label">
                  <i class="bi bi-lock"></i> Contraseña *
                </label>
                <input 
                  type="password" 
                  class="form-control" 
                  id="password"
                  [(ngModel)]="usuario.password" 
                  name="password"
                  placeholder="Mínimo 6 caracteres"
                  required
                  [disabled]="cargando">
              </div>

              <!-- Confirmar contraseña -->
              <div class="col-md-6 mb-3">
                <label for="passwordConfirm" class="form-label">Confirmar Contraseña *</label>
                <input 
                  type="password" 
                  class="form-control" 
                  id="passwordConfirm"
                  [(ngModel)]="passwordConfirm" 
                  name="passwordConfirm"
                  placeholder="Repetir contraseña"
                  required
                  [disabled]="cargando">
              </div>
            </div>

            

            <div class="row">
              <!-- Teléfono -->
              <div class="col-md-6 mb-3">
                <label for="telefono" class="form-label">Teléfono</label>
                <input 
                  type="tel" 
                  class="form-control" 
                  id="telefono"
                  [(ngModel)]="usuario.telefono" 
                  name="telefono"
                  placeholder="600123456"
                  [disabled]="cargando">
              </div>

              
            </div>

            <small class="text-muted">* Campos obligatorios</small>

            <!-- Botón de registro -->
            <div class="d-grid gap-2 mt-3 mb-3">
              <button 
                type="submit" 
                class="btn btn-primary btn-lg"
                [disabled]="cargando">
                <span *ngIf="!cargando">
                  <i class="bi bi-person-plus"></i> Crear Cuenta
                </span>
                <span *ngIf="cargando">
                  <span class="spinner-border spinner-border-sm" role="status"></span>
                  Creando cuenta...
                </span>
              </button>
            </div>

            <!-- Link a login -->
            <div class="text-center">
              <p class="text-muted">
                ¿Ya tienes cuenta? 
                <a href="#" (click)="irALogin(); $event.preventDefault()" class="text-primary">
                  Inicia sesión aquí
                </a>
              </p>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
